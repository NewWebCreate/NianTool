<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 后台系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.5s ease-out forwards; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <!-- 背景装饰 -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl"></div>
    </div>

    <!-- 登录卡片 -->
    <div class="relative w-full max-w-sm animate-fade-up">
        <!-- Logo 区域 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-800 rounded-2xl mb-4 border border-slate-700">
                <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-white tracking-tight">ADMIN PANEL</h1>
            <p class="text-slate-500 text-xs mt-1">请输入管理员凭据以继续</p>
        </div>

        <!-- 表单卡片 -->
        <div class="bg-slate-800/60 backdrop-blur-xl border border-slate-700/50 rounded-2xl p-6 shadow-2xl">
            <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
                <!-- 用户名 -->
                <div class="mb-4">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">账户名</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                        <input type="text" id="username" required
                            class="w-full pl-10 pr-4 py-2.5 bg-slate-900/60 border border-slate-600/50 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500/60 transition"
                            placeholder="输入账户名">
                    </div>
                </div>

                <!-- 密码 -->
                <div class="mb-5">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">密码</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <input type="password" id="password" required
                            class="w-full pl-10 pr-4 py-2.5 bg-slate-900/60 border border-slate-600/50 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500/60 transition"
                            placeholder="输入密码">
                    </div>
                </div>

                <!-- 错误提示 -->
                <div id="errorMsg" class="hidden mb-4 bg-red-500/10 border border-red-500/20 rounded-xl p-3 text-xs text-red-400 text-center"></div>

                <!-- 登录按钮 -->
                <button type="submit" id="loginBtn"
                    class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold rounded-xl transition-all duration-200 shadow-lg shadow-indigo-600/20 hover:shadow-indigo-500/30 active:scale-[0.98]">
                    登 录
                </button>
            </form>

            <!-- 加载状态 -->
            <div id="loadingState" class="hidden text-center py-2">
                <div class="inline-block w-5 h-5 border-2 border-indigo-400/30 border-t-indigo-400 rounded-full animate-spin"></div>
                <p class="text-slate-500 text-xs mt-2">正在验证...</p>
            </div>
        </div>

        <!-- 底部信息 -->
        <div class="text-center mt-6">
            <p class="text-slate-600 text-[10px] uppercase tracking-widest">XiaoNian Admin System</p>
        </div>
    </div>

<script>
// 如果已登录，直接跳转
if (localStorage.getItem('nian-admin-auth') === '1') {
    location.href = './overview.html';
}

async function handleLogin(e) {
    e.preventDefault();

    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;
    var errorMsg = document.getElementById('errorMsg');
    var loginBtn = document.getElementById('loginBtn');
    var loadingState = document.getElementById('loadingState');
    var form = document.getElementById('loginForm');

    // 隐藏错误
    errorMsg.classList.add('hidden');
    errorMsg.textContent = '';

    // 显示加载
    loginBtn.classList.add('hidden');
    loadingState.classList.remove('hidden');

    try {
        // 获取账户配置
        var resp = await fetch('../account.json', { cache: 'no-store' });
        if (!resp.ok) throw new Error('无法加载账户配置');
        var account = await resp.json();

        // 计算哈希: SHA-256(salt + username + password)
        var raw = account.salt + username + password;
        var encoded = new TextEncoder().encode(raw);
        var hashBuffer = await crypto.subtle.digest('SHA-256', encoded);
        var hashArray = Array.from(new Uint8Array(hashBuffer));
        var hashHex = hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');

        // 验证
        if (hashHex === account.hash) {
            // 登录成功
            localStorage.setItem('nian-admin-auth', '1');
            errorMsg.classList.remove('hidden');
            errorMsg.className = errorMsg.className.replace('red', 'green').replace('red', 'green');
            errorMsg.style.background = 'rgba(34,197,94,0.1)';
            errorMsg.style.borderColor = 'rgba(34,197,94,0.2)';
            errorMsg.style.color = '#4ade80';
            errorMsg.textContent = '登录成功，正在跳转...';
            setTimeout(function() {
                location.href = './overview.html';
            }, 600);
        } else {
            throw new Error('账户名或密码错误');
        }
    } catch (err) {
        // 登录失败
        loadingState.classList.add('hidden');
        loginBtn.classList.remove('hidden');

        errorMsg.classList.remove('hidden');
        errorMsg.style.background = 'rgba(239,68,68,0.1)';
        errorMsg.style.borderColor = 'rgba(239,68,68,0.2)';
        errorMsg.style.color = '#f87171';
        errorMsg.textContent = err.message || '登录失败，请重试';

        // 抖动动画
        var card = errorMsg.closest('.bg-slate-800\\/60');
        card.classList.add('animate-shake');
        setTimeout(function() { card.classList.remove('animate-shake'); }, 400);
    }
}
</script>

</body>
</html>
