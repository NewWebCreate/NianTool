<!-- ==========【网站响应检测板块】========== -->
<div class="bg-white p-4 lg:p-6 rounded-xl border border-slate-200 shadow-sm">
    <div class="flex items-center justify-between mb-4">
        <div class="text-xs font-bold text-slate-500 uppercase tracking-wider">
            网站响应检测 · tool.wunian.fun
        </div>
        <button id="btnReCheck" onclick="checkSiteResponse()" class="px-3 py-1.5 bg-slate-900 text-white text-xs rounded-lg hover:bg-slate-700 transition">
            重新检测
        </button>
    </div>
    <div id="check-loading" class="py-6 text-center text-slate-400 text-sm">
        正在检测网站响应...
    </div>
    <div id="check-error" class="py-6 text-center text-red-400 text-sm hidden">
        检测请求失败或超时，请稍后重试
    </div>
    <div id="check-result" class="hidden">
        <div class="grid grid-cols-2 lg:grid-cols-3 gap-4">
            <div>
                <div class="text-[10px] uppercase text-slate-400 font-bold">HTTP状态码</div>
                <div id="res-http-code" class="text-lg font-bold mt-1">-</div>
            </div>
            <div>
                <div class="text-[10px] uppercase text-slate-400 font-bold">总耗时</div>
                <div id="res-total-ms" class="text-lg font-bold mt-1">- ms</div>
            </div>
            <div>
                <div class="text-[10px] uppercase text-slate-400 font-bold">服务器IP</div>

            </div>
            <div>
                <div class="text-[10px] uppercase text-slate-400 font-bold">页面大小</div>
                <div id="res-size" class="text-lg font-bold mt-1">-</div>
            </div>
            <div class="col-span-2">
                <div class="text-[10px] uppercase text-slate-400 font-bold">最终访问地址</div>
                <div id="res-final-url" class="text-sm font-bold mt-1 break-all text-slate-700">-</div>
            </div>
        </div>
    </div>
</div>

<script src="//cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js" defer></script>
  <script>
        let isChecking = false;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('mask').classList.toggle('hidden');
        }

        //初始化图表：做元素存在判断，找不到canvas直接跳过，不阻断代码
        function initChart(){
            const canvasEl = document.getElementById('lineChart');
            if(!canvasEl){
                console.log("折线图Canvas不存在，跳过图表初始化");
                return;
            }
            const ctx = canvasEl.getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周天'],
                    datasets: [{
                        data: [40, 35, 55, 75, 60, 85, 70],
                        borderColor: '#a400ff',
                        backgroundColor: 'rgba(15, 23, 42, 0.05)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 2,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { font: { size: 10 } } }
                    }
                }
            });
        }

        // =========网站响应检测请求函数【独立任务，不受图表影响】=========
        async function checkSiteResponse(){
            if(isChecking) return;
            isChecking = true;
            const btn = document.getElementById("btnReCheck");
            btn.disabled = true;
            btn.innerText = "检测中...";

            //重置UI
            document.getElementById('check-loading').classList.remove('hidden');
            document.getElementById('check-error').classList.add('hidden');
            document.getElementById('check-result').classList.add('hidden');

            //5秒超时控制器
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(),5000);

            try {
                console.log("开始发起网站检测请求");
                const response = await fetch(
                  "https://apione.apibyte.cn/sitecheck?url=https://tool.wunian.fun",
                  {
                    method: "GET",
                    headers: {
                        "X-Api-Key": "Shanhai-jMFqfvUPPVExNMwNcKxwK6pRigKJzCtSU7AWfL7Wg1eW6EIh"
                    },
                    signal: controller.signal
                  }
                );
                clearTimeout(timeoutId);
                const data = await response.json();
                console.log("检测返回数据：",data);

                document.getElementById('check-loading').classList.add('hidden');
                document.getElementById('check-result').classList.remove('hidden');

                document.getElementById('res-http-code').innerText = data?.data?.http_code ?? "-";
                document.getElementById('res-total-ms').innerText = (data?.data?.timing?.total_ms ?? "-") + " ms";
                document.getElementById('res-ip').innerText = data?.data?.primary_ip ?? "-";
                document.getElementById('res-size').innerText = data?.data?.page_size_human ?? "-";
                document.getElementById('res-final-url').innerText = data?.data?.final_url ?? "-";

            } catch (err) {
                clearTimeout(timeoutId);
                console.error("检测异常/超时",err);
                document.getElementById('check-loading').classList.add('hidden');
                document.getElementById('check-error').classList.remove('hidden');
            }finally{
                isChecking = false;
                btn.disabled = false;
                btn.innerText = "重新检测";
            }
        }

        //DOM加载完成，两个任务完全独立执行，互不阻塞
        document.addEventListener("DOMContentLoaded",function(){
            //任务1：可选，初始化图表（找不到元素直接跳过）
            initChart();
            //任务2：必执行，自动执行网站响应检测
            checkSiteResponse();
        })
    </script>
