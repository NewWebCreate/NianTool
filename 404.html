<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-glass="off" data-blur="off">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 页面不存在</title>
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }
    @keyframes shimmer {
      0%   { left: -100%; }
      100% { left: 200%; }
    }

    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 200px);
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    .content {
      text-align: center;
      max-width: 520px;
      width: 100%;
      background: var(--surface, rgba(255,255,255,0.72));
      border: 1px solid var(--border, rgba(0,0,0,0.08));
      border-radius: 28px;
      padding: 48px 36px;
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
    }
    /* 卡片扫光 */
    .content::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      animation: shimmer 3.5s ease-in-out infinite 1s;
      pointer-events: none;
    }
    .title {
      font-size: clamp(60px, 15vw, 120px);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--accent, #6366f1), #a78bfa, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: float 3.5s ease-in-out infinite;
    }
    .subtitle {
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 600;
      color: var(--text-primary, #1e293b);
      margin-bottom: 12px;
    }
    .desc {
      font-size: 16px;
      color: var(--text-secondary, #64748b);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: var(--accent, #6366f1);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.25s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99,102,241,0.35);
      background: var(--accent-hover, #4f46e5);
    }

    /* 玻璃模式适配 */
    [data-glass="on"] .content {
      background: var(--glass-bg, rgba(255,255,255,0.45)) !important;
      border-color: var(--glass-border, rgba(255,255,255,0.5)) !important;
    }
  </style>
</head>
<body>
  <div id="m" style="position:fixed;inset:0;z-index:9999;background:#f0f2f5;display:flex;align-items:center;justify-content:center;"><i class="fa fa-spinner fa-spin" style="font-size:24px;color:#6366f1"></i></div>
  <div class="page">
    <div class="content">
      <div class="title">404</div>
      <div class="subtitle">页面未找到</div>
      <div class="desc">你访问的页面不存在或已被移动，请检查地址后重试。</div>
      <a href="https://tool.wunian.fun/" class="btn">返回首页</a>
    </div>
  </div>
  <script src="https://tool.wunian.fun/loading.js"></script>
  <script src="https://tool.wunian.fun/synchronize.js"></script>
</body>
</html>
