<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-glass="off" data-blur="off">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 页面不存在</title>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.6) rotate(-3deg); }
      to   { opacity: 1; transform: scale(1) rotate(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes borderGlow {
      0%, 100% { border-color: rgba(99,102,241,0.2); box-shadow: 0 0 15px rgba(99,102,241,0.1); }
      50%      { border-color: rgba(168,85,247,0.6); box-shadow: 0 0 35px rgba(168,85,247,0.25); }
    }
    @keyframes shimmer {
      0%   { left: -100%; }
      100% { left: 200%; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50%      { transform: scale(1.4); opacity: 0.9; }
    }
    @keyframes bounceIn {
      0%   { opacity: 0; transform: scale(0.3); }
      50%  { transform: scale(1.1); }
      70%  { transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes orbit1 {
      0%   { transform: translate(0,0) scale(1); }
      25%  { transform: translate(80px,-100px) scale(1.3); }
      50%  { transform: translate(-30px,-160px) scale(0.8); }
      75%  { transform: translate(-80px,-60px) scale(1.2); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes orbit2 {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(-90px,-120px) scale(1.4); }
      66%  { transform: translate(70px,-80px) scale(0.7); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes orbit3 {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(60px,-140px) scale(1.2); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes textGlow {
      0%, 100% { text-shadow: 0 0 10px rgba(99,102,241,0.2); }
      50%      { text-shadow: 0 0 30px rgba(168,85,247,0.5), 0 0 60px rgba(236,72,153,0.2); }
    }
    @keyframes ripple {
      0%   { transform: scale(0.8); opacity: 0.6; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 200px);
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    /* 浮动装饰粒子 */
    .dot {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .dot-1 { width:10px; height:10px; background:#6366f1; top:15%; left:10%; opacity:0.6; animation: orbit1 6s ease-in-out infinite; }
    .dot-2 { width:8px; height:8px; background:#ec4899; top:70%; right:12%; opacity:0.5; animation: orbit2 8s ease-in-out infinite 1s; }
    .dot-3 { width:6px; height:6px; background:#06b6d4; bottom:20%; left:20%; opacity:0.6; animation: orbit3 5s ease-in-out infinite 0.5s; }
    .dot-4 { width:12px; height:12px; background:#a78bfa; top:30%; right:8%; opacity:0.4; animation: orbit1 7s ease-in-out infinite 2s; }
    .dot-5 { width:7px; height:7px; background:#f59e0b; bottom:35%; right:25%; opacity:0.5; animation: orbit2 9s ease-in-out infinite 0.8s; }
    .dot-6 { width:9px; height:9px; background:#10b981; top:50%; left:5%; opacity:0.4; animation: orbit3 7s ease-in-out infinite 1.5s; }
    .dot-7 { width:5px; height:5px; background:#f43f5e; top:25%; right:30%; opacity:0.5; animation: orbit1 10s ease-in-out infinite 3s; }
    .dot-8 { width:11px; height:11px; background:#8b5cf6; bottom:10%; right:40%; opacity:0.3; animation: orbit2 6s ease-in-out infinite 0.3s; }

    .content {
      text-align: center;
      max-width: 520px;
      width: 100%;
      background: var(--surface, rgba(255,255,255,0.72));
      border: 2px solid rgba(99,102,241,0.25);
      border-radius: 28px;
      padding: 48px 36px;
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      position: relative;
      overflow: hidden;
      animation: fadeInScale 0.8s cubic-bezier(0.4,0,0.2,1) both,
                 borderGlow 3s ease-in-out infinite 1s;
    }
    /* 卡片闪光扫过 */
    .content::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      animation: shimmer 3.5s ease-in-out infinite 2s;
      pointer-events: none;
    }
    /* 卡片角落光晕 */
    .content::after {
      content: '';
      position: absolute;
      bottom: -20px; right: -20px;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.2), transparent 70%);
      animation: pulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    .title {
      font-size: clamp(60px, 15vw, 120px);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #6366f1, #a78bfa, #ec4899, #06b6d4, #6366f1);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeInUp 0.6s 0.2s cubic-bezier(0.4,0,0.2,1) both,
                 gradientShift 4s ease infinite,
                 float 3.5s ease-in-out infinite 1s,
                 textGlow 3s ease-in-out infinite 1.5s;
    }
    .subtitle {
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 600;
      color: var(--text-primary, #1e293b);
      margin-bottom: 12px;
      animation: slideInLeft 0.6s 0.4s cubic-bezier(0.4,0,0.2,1) both;
    }
    .desc {
      font-size: 16px;
      color: var(--text-secondary, #64748b);
      line-height: 1.6;
      margin-bottom: 32px;
      animation: slideInRight 0.6s 0.55s cubic-bezier(0.4,0,0.2,1) both;
    }
    .btn-wrap {
      position: relative;
      display: inline-block;
    }
    /* 按钮脉冲波纹 */
    .btn-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 16px;
      border: 2px solid var(--accent, #6366f1);
      animation: ripple 2s ease-out infinite;
      pointer-events: none;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      background-size: 200% 200%;
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      animation: bounceIn 0.7s 0.7s cubic-bezier(0.4,0,0.2,1) both,
                 gradientShift 3s ease infinite;
      position: relative;
      z-index: 1;
    }
    .btn:hover {
      transform: translateY(-3px) scale(1.06);
      box-shadow: 0 8px 30px rgba(99,102,241,0.5);
    }
    .btn:active {
      transform: translateY(0) scale(0.97);
    }

    /* 旋转装饰环 */
    .ring {
      position: absolute;
      border: 2px dashed rgba(99,102,241,0.12);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .ring-1 {
      width: 300px; height: 300px;
      top: -80px; left: -80px;
      animation: spin 20s linear infinite;
    }
    .ring-2 {
      width: 200px; height: 200px;
      bottom: -60px; right: -60px;
      border-color: rgba(236,72,153,0.1);
      animation: spin 15s linear infinite reverse;
    }

    /* 玻璃模式适配 */
    [data-glass="on"] .content {
      background: var(--glass-bg, rgba(255,255,255,0.45)) !important;
      border-color: var(--glass-border, rgba(255,255,255,0.5)) !important;
    }
  </style>
</head>
<body>
  <div id="m" style="position:fixed;inset:0;z-index:9999;background:#f0f2f5;display:flex;align-items:center;justify-content:center;"><i class="fa fa-spinner fa-spin" style="font-size:24px;color:#6366f1"></i></div>
  <div class="page">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>
    <div class="dot dot-5"></div>
    <div class="dot dot-6"></div>
    <div class="dot dot-7"></div>
    <div class="dot dot-8"></div>
    <div class="content">
      <div class="title">404</div>
      <div class="subtitle">页面未找到</div>
      <div class="desc">你访问的页面不存在或已被移动，请检查地址后重试。</div>
      <div class="btn-wrap"><a href="/" class="btn">返回首页</a></div>
    </div>
  </div>
  <script src="loading.js"></script>
  <script src="synchronize.js"></script>
</body>
</html>
