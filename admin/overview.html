<script src="//cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js" defer></script>
<script>
 (function(){
   let running = false;
   const apiUrl = "https://api.zbape.com/api/velocity/query?key=rqpR4LPtjWnzgacsZWqBusBxGXPt3GfP&url=tool.wunian.fun";
   const btn = document.getElementById("speedTestBtn");
   const loadingDom = document.getElementById("speedLoading");
   const errorDom = document.getElementById("speedError");
   const resultDom = document.getElementById("speedResult");
   // 重置显示状态：每次测速先清空错误、结果，只展示加载
   function resetView(){
     loadingDom.classList.remove("hidden");
     errorDom.classList.add("hidden");
     resultDom.classList.add("hidden");
   }
   // 填充接口返回测速数据
   function fillData(data, code){
     document.getElementById("resCode").innerText = code || "-";
     document.getElementById("resLoc").innerText = data.location || "-";
     document.getElementById("resIp").innerText = data.ip || "-";
     document.getElementById("resAvg").innerText = data.average || "-";
     document.getElementById("resMin").innerText = data.min || "-";
     document.getElementById("resMax").innerText = data.max || "-";
     document.getElementById("resHost").innerText = data.host || "-";
   }
   // 测速主逻辑
   async function testSpeed(){
     if(running) return;
     running = true;
     btn.disabled = true;
     btn.innerText = "测速中...";
     // 每次测速强制重置，清除上一次错误提示（修复残留bug核心）
     resetView();
     const controller = new AbortController();
     const timer = setTimeout(()=>controller.abort(),5000);
     try{
       const resp = await fetch(apiUrl, {signal:controller.signal});
       clearTimeout(timer);
       const res = await resp.json();
       if(res.code !== 200) throw new Error(res.msg || "接口返回异常");
       // 请求成功，隐藏加载，展示结果
       loadingDom.classList.add("hidden");
       resultDom.classList.remove("hidden");
       fillData(res.data, res.code);
     }catch(e){
       clearTimeout(timer);
       // 仅异常时显示错误，下一次测速会被resetView清除
       loadingDom.classList.add("hidden");
       errorDom.classList.remove("hidden");
       console.log("测速报错：",e);
     }finally{
       running = false;
       btn.disabled = false;
       btn.innerText = "重新测速";
     }
   }
   // 页面全部资源加载完成后自动测速
   window.addEventListener("load",()=>{
     setTimeout(testSpeed,200);
   })
   // 按钮点击触发测速
   btn.addEventListener("click",testSpeed);
 })();
 </script>
