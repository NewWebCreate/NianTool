<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-glass="off" data-blur="off">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 页面不存在</title>
  <style>
    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 200px);
      padding: 20px;
    }
    .content {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .title {
      font-size: clamp(60px, 15vw, 120px);
      font-weight: 900;
      color: var(--text-tertiary, #cbd5e1);
      line-height: 1;
      margin-bottom: 16px;
    }
    .subtitle {
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 600;
      color: var(--text-primary, #1e293b);
      margin-bottom: 12px;
    }
    .desc {
      font-size: 16px;
      color: var(--text-secondary, #64748b);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #3b82f6;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      font-size: 16px;
      transition: background 0.2s ease;
    }
    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div id="m" style="position:fixed;inset:0;z-index:9999;background:#f0f2f5;display:flex;align-items:center;justify-content:center;"><i class="fa fa-spinner fa-spin" style="font-size:24px;color:#6366f1"></i></div>
  <div class="page">
    <div class="content">
      <div class="title">404</div>
      <div class="subtitle">页面未找到</div>
      <div class="desc">你访问的页面不存在或已被移动，请检查地址后重试。</div>
      <a href="/" class="btn">返回首页</a>
    </div>
  </div>
  <script src="loading.js"></script>
  <script src="synchronize.js"></script>
</body>
</html>
